<!DOCTYPE html>
<html lang="zh-Hant">

<script src="https://code.highcharts.com/highcharts.js"></script>
<script src="https://code.highcharts.com/modules/exporting.js"></script>

<script src="https://code.highcharts.com/modules/accessibility.js"></script>

<style>
body { font-family: "Noto Serif CJK TC", serif; background:#f0f2f5; }
#inputArea { margin-bottom: 20px; background: linear-gradient(135deg,#e0f0ff,#c0e0ff); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
#inputArea h3 { font-size:22px; margin-bottom:15px; color:#004080;}
#inputArea label { font-size:18px; color:#003366; margin-right:15px;}
#inputArea input[type="text"], #inputArea input[type="number"] { font-size:18px; padding:6px 10px; border:2px solid #007acc; border-radius:6px; margin-right:10px; width:120px; color:#003366; }
#inputArea button { font-size:18px; padding:6px 12px; border:none; border-radius:6px; background:linear-gradient(135deg,#00aaff,#0055cc); color:#fff; cursor:pointer; transition: all 0.2s; }
#inputArea button:hover { background:linear-gradient(135deg,#007acc,#003366);}
#inputs div { margin-bottom:8px; }
</style>
</head>

<body>
<div id="container" style="width:100%; height:520px;"></div>
<div id="inputArea">
  <h3>繪製管制圖</h3>

  <label>標題名稱：

  </label>
  <br><br>

      <span class="amountLabel">金額</span>：

      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202503">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="13">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>	
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202504">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="9">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202505">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="17">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202506">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="13">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>	
		    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202507">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="18">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202508">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="21">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202509">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="20">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>	
		    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202510">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="22">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：

    </div>
	    <div>
      <span class="categoryLabel">西元年月</span>：
      <input type="text" class="name" value="202512">
      <span class="amountLabel">金額</span>：
      <input type="number" class="value" value="19">
      <button onclick="removeRow(this)">移除此欄位</button>
    </div>	
  </div>

  <button onclick="addRow()">新增欄位</button>
  <button onclick="updateChart()">更新管制圖</button>
</div>



<script>
let chart;

function addRow(){
  const xLabel = document.getElementById('xAxisTitle').value || '西元年月';
  const yLabel = document.getElementById('yAxisTitle').value || '金額';

  const div = document.createElement('div');
  div.innerHTML = `
    <span class="categoryLabel">${xLabel}</span>：
    <input type="text" class="name">
    <span class="amountLabel">${yLabel}</span>：
    <input type="number" class="value">
    <button onclick="removeRow(this)">移除此欄位</button>
  `;
  document.getElementById('inputs').appendChild(div);
}

function removeRow(btn){ btn.parentNode.remove(); }

function getRawData(){
  const rows = document.querySelectorAll('#inputs > div');
  const data = [];
  rows.forEach(row=>{
    const name = row.querySelector('.name').value.trim();
    const value = parseFloat(row.querySelector('.value').value) || 0;
    if(name && value >= 0){
      data.push({ name, value });
    }
  });
  return data;
}

function updateChart(){
  let rawData = getRawData();
  if(rawData.length === 0){ alert('請至少輸入一筆資料'); return; }

  const total = rawData.reduce((s,d)=>s+d.value,0);
  const avg = total / rawData.length; // 平均值
  const values = rawData.map(d=>d.value);
  const sd = Math.sqrt(values.reduce((sum,v)=>sum + Math.pow(v-avg,2),0)/values.length); // 標準差

  const categories = rawData.map(d=>d.name);

  const seriesData = rawData.map(d=>{
    return {
      y: d.value,
      name: d.name,
      dataLabels: {
        enabled:true,
        formatter:function(){
          const rawUnit = document.getElementById('yAxisTitle').value || '';
          const match = rawUnit.match(/\(.*?\)/);
          const unit = match ? match[0] : '';
          return this.point.name + this.point.y + unit;
        },
        style:{ fontSize:'14px', fontWeight:'bold' }
      }
    };
  });

const sdLines = [3,2,1,-1,-2,-3].map(n=>{
  const colors = ['#66CC66','#B5A642','#FF0000','#FF0000','#B5A642','#66CC66']; // +3~+1, -1~-3
  const value = avg + n*sd;
  const labelText = (n>0 ? '+'+n+'SD ' : n+'SD ') + value.toFixed(1);
  const colorIndex = Math.abs(n)-1;
  return {
    color: colors[colorIndex],
    width: 2,
    dashStyle: 'ShortDash',
    value: value,
    label: {
      text: labelText,
      align: 'right',
      x: -10,
      style: { 
        fontSize:'14px', 
        fontFamily:'Noto Serif CJK TC', 
        fontWeight:'bold' 
      }
    },
    zIndex: 5
  };
});



  if(chart) chart.destroy();

  chart = Highcharts.chart('container',{
    chart:{ style:{ fontFamily:'Noto Serif CJK TC', fontSize:'16px' } },
    title:{ text:'' },
    caption:{
      text: document.getElementById('chartTitle').value,
      align:'center',
      verticalAlign:'bottom',
      style:{ fontSize:'20px', fontWeight:'bold', color:'#003366' }
    },
    credits:{ enabled:false },
	
	
//下載	
exporting: {
    enabled: true,
    filename: 'ControlChart',
    buttons: {
        contextButton: {
            menuItems: [
                {
                    text: '下載 JPEG',
                    onclick: function() {
                        this.exportChart(
                            { type: 'image/jpeg' },
                            { filename: 'ControlChart' }
                        );
                    }
                },
                {
                    text: '下載 Excel',
                    onclick: function() {
                        this.downloadXLS();
                    }
                }
            ]
        }
    }
},	
	
	
	
    legend:{ enabled:false },
    xAxis:{
      categories: categories,
      title:{ text: document.getElementById('xAxisTitle').value },
      labels:{ style:{ fontSize:'16px' } }
    },
    yAxis:{
      title:{ text: document.getElementById('yAxisTitle').value },
      labels:{ style:{ fontSize:'16px' } },
      plotLines:[
        ...sdLines,
        { // 平均值線
          color:'#000000',
          width:2,
          value: avg,
          label:{
            text:'平均值 '+avg.toFixed(1),
            align:'right',
            x:-10,
            style:{ fontSize:'14px', fontFamily:'Noto Serif CJK TC', fontWeight:'bold' }
          },
          zIndex:5
        }
      ]
    },
    tooltip:{ formatter:function(){ return this.y; } },
    plotOptions:{
      line:{ dataLabels:{ enabled:true }, marker:{ enabled:true } }
    },
    series:[
      {
        type:'line',
        name:'趨勢',
        data: rawData.map(d=>d.value),
        marker:{ enabled:true, radius:4 },
        dataLabels:{ enabled:true, style:{ fontSize:'14px', fontWeight:'bold' } }
      }
    ]
  });
}

updateChart();

document.getElementById('chartTitle')
  .addEventListener('input',()=>{ if(chart) chart.update({ caption:{ text:chartTitle.value } }); });

document.getElementById('xAxisTitle')
  .addEventListener('input',function(){
    document.querySelectorAll('.categoryLabel')
      .forEach(e=>e.textContent=this.value||'西元年月');
  });

document.getElementById('yAxisTitle')
  .addEventListener('input',function(){
    document.querySelectorAll('.amountLabel')
      .forEach(e=>e.textContent=this.value||'金額');
    updateChart();
  });

</script>

</body>
</html>
